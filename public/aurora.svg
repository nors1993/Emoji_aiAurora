<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#aurora)" opacity="0.2"/>
  
  <!-- Main orb -->
  <circle cx="64" cy="64" r="40" fill="url(#aurora)" filter="url(#glow)"/>
  
  <!-- Inner glow -->
  <circle cx="64" cy="64" r="30" fill="#c4b5fd" opacity="0.5"/>
  
  <!-- Eyes -->
  <ellipse cx="50" cy="56" rx="8" ry="10" fill="#1a1a2e"/>
  <ellipse cx="78" cy="56" rx="8" ry="10" fill="#1a1a2e"/>
  
  <!-- Eye highlights -->
  <circle cx="53" cy="53" r="3" fill="white"/>
  <circle cx="81" cy="53" r="3" fill="white"/>
  
  <!-- Smile -->
  <path d="M 44 75 Q 64 90 84 75" stroke="#1a1a2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <circle cx="38" cy="70" r="6" fill="#ff69b4" opacity="0.4"/>
  <circle cx="90" cy="70" r="6" fill="#ff69b4" opacity="0.4"/>
  
  <!-- Sparkles -->
  <text x="20" y="30" font-size="16">✨</text>
  <text x="100" y="25" font-size="12">✨</text>
  <text x="105" y="100" font-size="14">✨</text>
</svg>
